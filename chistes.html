<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Chistes para mamá</title>

<style>

body{
font-family:Arial;
background:#fff0f5;
text-align:center;
padding:40px;
}

.navegacion{
margin-top:40px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.navegacion a{
text-decoration:none;
background:#ff6b81;
color:white;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.navegacion a:hover{
transform:scale(1.1);
background:#ff4d6d;
}

a{
display:inline-block;
margin-top:30px;
text-decoration:none;
background:#ff6b81;
color:white;
padding:10px 20px;
border-radius:10px;
position: relative;
z-index: 10;
}

.chiste{
background:white;
padding:20px;
margin:20px auto;
max-width:600px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.chiste-box{
max-width:600px;
margin:30px auto;
padding:25px;
background:white;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.2);
font-size:22px;
position: relative;
z-index: 10;
}

.imagen-chiste{
width:250px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
position: relative;
z-index: 10;
}

.ladoIzq{
position:fixed;
left: -70px;
top:35%;
height:80vh;
opacity:50;
pointer-events:none;
position: fixed;
z-index: 1;
}

.ladoDer{
position:fixed;
right:0;
top:20%;
height:80vh;
opacity:50;
pointer-events:none;
position: fixed;
z-index: 1;
}

@media (max-width: 768px) {
  .ladoDer,
  .ladoIzq {
    height: 85dvh; /* 👈 un poco más pequeñas */
    opacity: 0.5;  /* opcional: más sutil */
    z-index: 0;
  }
}

.risas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.risa{
position:absolute;
font-size:30px;
animation:caer 2s linear forwards;
}

@keyframes caer{
0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

@media (max-width:600px){

.navegacion{
flex-direction:column;
gap:10px;
}

h1{
font-size:35px;
}

p{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="risas"></div>

<script>

document.addEventListener("click", lluviaRisas);

function lluviaRisas(e){

let contenedor = document.querySelector(".risas");

for(let i=0;i<15;i++){

let emoji = document.createElement("div");

emoji.className="risa";

let emojis = ["😂","🤣","😆","😹"];

emoji.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

emoji.style.left = Math.random()*100 + "vw";

emoji.style.top = (e.clientY - 20) + "px";

emoji.style.fontSize = (20 + Math.random()*30) + "px";

contenedor.appendChild(emoji);

setTimeout(()=>{
emoji.remove();
},2000);

}

}

</script>

<img src="imagenes/Diseño_sin_título-removebg-preview.png" class="ladoIzq">
<img src="imagenes/images__2_-removebg-preview.png" class="ladoDer">

<h1>😂 Chistes para mamá</h1>

<div class="chiste-box" id="chiste">
Haz clic en "Otro chiste" para empezar 😄
</div>

<button onclick="nuevoChiste()">Otro chiste</button>

<br><br>

<img id="imagenChiste" src="imagenes/12.jpg" class="imagen-chiste">

<br><br>

<audio id="audioEntrada" src="musica/11.mp4"></audio>
<audio id="audioChiste"></audio>


<script>

window.onload = function(){

let entrada = document.getElementById("audioEntrada");

entrada.play();

}

const chistes = [

"— Mamá, en el colegio me llaman distraído. — Juanito… tú vives en la casa de al lado.",

"— Mamá, ¿qué hace una abeja en el gimnasio? — ¡Zum-ba!",

"— Mamá, ¿por qué el libro de matemáticas estaba triste? — Porque tenía muchos problemas.",

"Conocí a mi novia en un ascensor. Dice que soy el amor de subida.",

"— Mamá, ¿sabes cuál es el animal más antiguo? — La cebra, porque está en blanco y negro.",

"— Mamá, en el colegio me dicen mentiroso. — ¿Ah sí? — Sí… ¡y ni siquiera voy!",

"— Mamá, ¿qué hace una escoba en el gimnasio? — ¡Barriendo récords!",

"— Mamá, ¿qué hace un pez en internet? — Nada.",

"No renuncies a tus sueños, sigue durmiendo.",

"Nunca le rompas el corazón a alguien, solo tienen uno. Rómpele los huesos mejor, tienen 206."

];

const imagenes = [
"imagenes/1.jpg",
"imagenes/2.jpg",
"imagenes/3.jpg",
"imagenes/4.jpg",
"imagenes/5.jpg",
"imagenes/6.jpg",
"imagenes/7.jpg",
"imagenes/8.jpg",
"imagenes/9.jpg",
"imagenes/10.jpg"
];

const audios = [
"musica/1.mp3",
"musica/2.mp3",
"musica/3.mp3",
"musica/4.mp3",
"musica/5.mp3",
"musica/6.mp3",
"musica/7.mp3",
"musica/8.mp3",
"musica/9.mp3",
"musica/10.mp3"
];

let indice = 0;

function nuevoChiste(){

let entrada = document.getElementById("audioEntrada");
entrada.pause();
entrada.currentTime = 0;

document.getElementById("chiste").innerText = chistes[indice];

document.getElementById("imagenChiste").src = imagenes[indice];

let audio = document.getElementById("audioChiste");

audio.src = audios[indice];
audio.currentTime = 0;
audio.play();

indice++;

if(indice >= chistes.length){
indice = 0;
}

}

</script>

</body>
</html>
