<!DOCTYPE html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fotos</title>

<style>

body{
font-family:Arial;
background:#fff0f5;
text-align:center;
padding:40px;
}

.carrusel{
position:relative;
width:350px;
max-width:90%;
margin:40px auto;
}

.carrusel img{
width:100%;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:opacity 0.5s ease;
position: relative;
z-index: 10;
}

.flecha{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,107,129,0.8);
border:none;
color:white;
font-size:28px;
padding:8px 14px;
border-radius:50%;
cursor:pointer;
transition:0.3s;
position: absolute;
z-index: 20;
}

.flecha:hover{
background:#ff4d6d;
transform:translateY(-50%) scale(1.1);
}

.izquierda{
left:-15px;
}

.derecha{
right:-15px;
}

a{
display:inline-block;
margin-top:30px;
text-decoration:none;
background:#ff6b81;
color:white;
padding:10px 20px;
border-radius:10px;
position: relative;
z-index: 10;
}

p1{font-size:25px;
color:#444;
margin-bottom:30px;
position: relative;
z-index: 10;
}

p{
font-size:18px;
color:#444;
margin-bottom:30px;
position: relative;
z-index: 10;
}

h1{
color:#ff4d6d;
font-size:40px;
margin-bottom:10px;
position: relative;
z-index: 10;
}

.navegacion{
margin-top:40px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.navegacion a{
text-decoration:none;
background:#ff6b81;
color:white;
padding:10px 20px;
border-radius:10px;
font-weight:bold;
transition:0.3s;
}

.navegacion a:hover{
transform:scale(1.1);
background:#ff4d6d;
}

.galeria{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

.galeria img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:15px;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:opacity 0.5s ease;
position: relative;
z-index: 10;
}

.galeria img:hover{
transform:scale(1.05);
}

#visor{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

#visor img{
max-width:90%;
max-height:90%;
border-radius:15px;
}

@keyframes aparecer{
to{
opacity:1;
transform:translateY(0);
}
}

.flores{
position:fixed;
bottom:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.flor{
position:absolute;
bottom:-50px;
font-size:25px;
animation:flotar 10s linear infinite;
opacity:0.8;
}

@keyframes flotar{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

.floresDerecha{
position:fixed;
right:0;
top:50%;
transform:translateY(-50%);
height:110vh;
opacity:0.8;
position: fixed;
z-index: 1;
}

.floresizquierda{
position:fixed;
left:0;
top:50%;
transform:translateY(-50%);
height:110vh;
opacity:0.8;
position: fixed;
z-index: 1;
}

@media (max-width: 768px) {
  .floresDerecha,
  .floresizquierda {
    height: 85dvh; /* 👈 un poco más pequeñas */
    opacity: 0.5;  /* opcional: más sutil */
    z-index: 0;
  }
}

@media (max-width:600px){

.navegacion{
flex-direction:column;
gap:10px;
}

h1{
font-size:35px;
}

p{
font-size:18px;
}

}

</style>
</head>

<script>

function crearFlor(){

let flor = document.createElement("div");
flor.className = "flor";

flor.innerHTML = "🌸";

flor.style.left = Math.random()*100 + "vw";
flor.style.fontSize = (20 + Math.random()*30) + "px";
flor.style.animationDuration = (8 + Math.random()*6) + "s";

document.querySelector(".flores").appendChild(flor);

setTimeout(()=>{
flor.remove();
},14000);

}

setInterval(crearFlor,800);

</script>

<script>

function abrirImagen(src){
let visor = document.getElementById("visor");
let imgGrande = document.getElementById("imgGrande");

imgGrande.src = src;
visor.style.display = "flex";

function cerrarVisor(){
document.getElementById("visor").style.display = "none";
}

let indice = 0;

function cambiarFoto(direccion){

indice += direccion;

if(indice < 0){
indice = fotos.length - 1;
}

if(indice >= fotos.length){
indice = 0;
}

document.getElementById("fotoCarrusel").src = fotos[indice];

}

setInterval(function(){
cambiarFoto(1);
},4000);

</script>
