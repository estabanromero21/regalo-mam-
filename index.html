<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;

/* 🔧 CAMBIO IMPORTANTE */
min-height:100vh; /* en vez de height */
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

/* 🔧 evita cortes raros en móvil */
overflow-x:hidden;
overflow-y:auto;
}

#sorpresa{
display:none;
color:white;
text-align:center;
margin-top:80px;
padding:10px; /* 👈 evita que toque bordes */
}

h1{
font-size:60px;
margin:20px 0;
position: relative;
z-index: 10;
}

p{
font-size:22px;
padding:0 10px; /* 👈 aire en celular */
position: relative;
z-index: 10;
}

.foto-mama{
display:block;
margin:30px auto;
max-height:40vh;
width:auto;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
transition:0.3s;
max-width:90vw; /* 👈 evita que se desborde */
position: relative;
z-index: 10;
}

.foto-mama:hover{
transform:scale(1.05);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

button{
font-size:25px;
padding:20px 40px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:0.3s;
max-width:90vw; /* 👈 clave en móvil */
position: relative;
z-index: 10;
}

button:hover{
transform:scale(1.1);
background:#ff1e4d;
}

.opciones-regalo{
margin-top:40px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
opacity:0;
pointer-events:none;
transition:1s;
padding:0 10px;
}

.mostrar-opciones{
opacity:1;
pointer-events:auto;
}

.boton-regalo{
background:white;
padding:15px 25px;
border-radius:10px;
text-decoration:none;
color:#333;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.3s;
position: relative;
z-index: 10;
}

.boton-regalo:hover{
transform:scale(1.1);
background:#ffe6ea;
}

.confeti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:caer 3s linear infinite;
}

.rosa{
position:fixed;
top:50%;
transform:translateY(-50%);
height:120vh;
width:auto;
z-index:1;
pointer-events:none;
}

.rosa-izq{
left:20px;
}

.rosa-der{
right:20px;
transform:translateY(-50%) scaleX(-1);
}

@media (max-width: 768px) {
  .rosa {
    height: 90vh;
    opacity: 0.6;
    z-index: 0;
  }

  .rosa-izq {
    left: 0;
  }

  .rosa-der {
    right: 0;
  }
}

.ocultar-rosas{
opacity:0;
}

#corazones{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.corazon{
position:absolute;
color:#ff4d6d;
font-size:25px;
animation:flotar 6s linear infinite;
}

@keyframes flotar{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

@keyframes caer{
0%{
transform:translateY(-10px) rotate(0);
}
100%{
transform:translateY(100vh) rotate(360deg);
}
}

/* 🔧 POLAROIDS */
#polaroids{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
opacity:0;
transition:1.5s;
flex-wrap:wrap; /* 👈 evita que rompa layout */
justify-content:center;
max-width:95vw;
}

.polaroid{
background:white;
padding:10px 10px 25px 10px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
width:150px;
transition:0.3s;
}

.polaroid img{
width:100%;
height:110px;
object-fit:cover;
display:block;
}

.polaroid:nth-child(2){ transform:rotate(4deg); }
.polaroid:nth-child(3){ transform:rotate(-3deg); }
.polaroid:nth-child(4){ transform:rotate(6deg); }
.polaroid:nth-child(5){ transform:rotate(-4deg); }

.polaroid:hover{
transform:scale(1.1) rotate(0deg);
}

/* 🔥 RESPONSIVE REAL */
@media (max-width: 768px) {

  #polaroids {
    position:relative; /* 👈 CLAVE para que no tape todo */
    top:0;
    left:auto;
    transform:none;
  }

  .polaroid {
    width:30vw;
    max-width:120px;
  }

  .polaroid img {
    height:80px;
  }

}

@media (max-width:600px){

h1{ font-size:35px; }
p{ font-size:18px; }

button{
font-size:18px;
padding:15px 25px;
}

}

#polaroids {
  margin-bottom: 5vh; /* 5% de la altura de la pantalla */
}

#titulo {
  margin-top: 35vh; /* 3% de la altura de la pantalla */
}

@media (max-width: 768px) {
  #polaroids {
    margin-bottom: 8vw; /* proporcional al ancho en móvil */
  }
  #titulo {
    margin-top: 35vw;
  }
}

</style>
</head>

<body>

<img src="imagenes/rosa-izquierda.png" class="rosa rosa-izq">
<img src="imagenes/rosa-derecha.png" class="rosa rosa-der">

<div id="inicio">

<button onclick="mostrarSorpresa()">Abrir tu regalo 🎁</button>

<br><br>

<img src="imagenes/mama.jpeg" class="foto-mama">
</div>

<div id="corazones"></div>

<div id="sorpresa">

<div id="polaroids">

<div class="polaroid"><img src="imagenes/51.jpeg"></div>
<div class="polaroid"><img src="imagenes/52.jpeg"></div>
<div class="polaroid"><img src="imagenes/53.jpeg"></div>
<div class="polaroid"><img src="imagenes/54.jpeg"></div>
<div class="polaroid"><img src="imagenes/30.jpeg"></div>

</div>

<br>

<h1 id="titulo"></h1>

<p>
Gracias por todo tu amor, tu paciencia y tu apoyo.  
Esta pequeña página es solo una forma de decirte cuánto te quiero.
</p>

</div>

<script>

function mostrarSorpresa(){

document.getElementById("inicio").style.display="none";
document.getElementById("sorpresa").style.display="block";

document.getElementById("polaroids").style.opacity="1";

/* 🔧 FIX ERROR JS */
let opciones = document.querySelector(".opciones-regalo");
if(opciones){
opciones.classList.add("mostrar-opciones");
}

/* 🔧 FIX AUDIO MOVIL */
let musica = document.getElementById("musica");
if(musica){
musica.play().catch(()=>{});
}

document.querySelectorAll(".rosa").forEach(rosa=>{
rosa.classList.add("ocultar-rosas");
});

crearConfeti();
escribirTexto();

}

function crearConfeti(){

for(let i=0;i<80;i++){

let confeti=document.createElement("div");
confeti.classList.add("confeti");

confeti.style.left=Math.random()*100+"vw";
confeti.style.backgroundColor="hsl("+Math.random()*360+",100%,50%)";
confeti.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(confeti);

}

}

function escribirTexto(){

let texto = "🎂 ¡Feliz cumpleaños mamá! 🎂";
let i = 0;

function escribir(){
if(i < texto.length){
document.getElementById("titulo").innerHTML += texto.charAt(i);
i++;
setTimeout(escribir, 80);
}
}

escribir();
}

function crearCorazon(){

const corazon = document.createElement("div");
corazon.classList.add("corazon");
corazon.innerHTML = "❤";

corazon.style.left = Math.random() * 100 + "vw";
corazon.style.fontSize = (20 + Math.random()*30) + "px";

document.getElementById("corazones").appendChild(corazon);

setTimeout(() => {
corazon.remove();
}, 6000);

}

setInterval(crearCorazon, 400);

</script>

<div class="opciones-regalo">

<a href="mensajes.html" class="boton-regalo">💌 Mensajes para mamá</a>
<a href="fotos.html" class="boton-regalo">📸 Fotos hermosas</a>
<a href="chistes.html" class="boton-regalo">😂 Chistes para reír</a>

</div>

<audio id="musica" src="musica/cumple.mp3"></audio>

</body>
</html>
